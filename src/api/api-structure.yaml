openapi: 3.1.0
info:
  title: LINE注文アプリ API
  version: '1.0'
  description: LINEミニアプリ注文システムのAPI（line-order-api）
paths:
  /user-token:
    get:
      summary: ユーザートークン取得
      operationId: getUserToken
      description: LINE ID Token を検証し、アプリ用の userToken（JWT）を発行します。
      security:
        - LINE ID Token: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  userToken:
                    type: string
                    description: ユーザートークン（JWT）
                  lineUserId:
                    type: string
                    description: LINEユーザーID
                    pattern: 'U[0-9a-f]{32}'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /orders:
    post:
      summary: 注文作成
      operationId: postOrders
      description: 注文を作成します。
      security:
        - userToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderList
                - liffAccessToken
              properties:
                orderList:
                  type: array
                  items:
                    $ref: '#/components/schemas/OrderItem'
                liffAccessToken:
                  type: string
                  description: サービス通知トークン発行に使う LIFF アクセストークン
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                  status:
                    $ref: '#/components/schemas/OrderStatus'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /orders/history:
    get:
      summary: 注文履歴取得
      operationId: getOrderHistory
      description: ログイン中ユーザーの注文履歴を返します。
      security:
        - userToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderList:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderHistoryItem'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
components:
  securitySchemes:
    LINE ID Token:
      type: apiKey
      in: header
      name: line-id-token
    userToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OrderStatus:
      type: string
      enum:
        - open
        - done
        - closed
      description: 注文状態（open:注文受付 / done:準備完了 / closed:受渡完了）
    OrderItem:
      type: object
      required:
        - productId
        - name
        - qty
      properties:
        productId:
          type: string
          description: microCMS のメニューID
        name:
          type: string
          description: メニュー名
        qty:
          type: integer
          description: 数量
          minimum: 1
    OrderHistoryItem:
      type: object
      properties:
        orderId:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        orderList:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        createdAt:
          type: string
    UnauthorizedError:
      type: object
      properties:
        message:
          type: string
    InternalServerError:
      type: object
      properties:
        message:
          type: string
    BadRequestError:
      type: object
      properties:
        message:
          type: string
        errorParams:
          type: array
          description: 不正があるリクエスト項目の一覧
          items:
            type: string
