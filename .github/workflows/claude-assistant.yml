# .github/workflows/claude.yml
name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
    runs-on: ubuntu-latest

    # セキュリティ: write権限以上のコントリビュータかつ@claude メンション時のみ実行
    if: |
      (
        github.actor == github.repository_owner ||
        contains('["write", "admin", "maintain"]', github.event.comment.author_association) ||
        contains('["write", "admin", "maintain"]', github.event.issue.author_association) ||
        contains('["write", "admin", "maintain"]', github.event.review.author_association)
      ) &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout (Claudeに編集させる場合は必要)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Action (v1, OAuth/GitHub App)
        uses: anthropics/claude-code-action@v1
        with:
          # Maxプランは APIキー不要。GitHub App(OAuth)で動作
          # trigger_phrase は省略時 @claude。必要なら明示的に指定:
          trigger_phrase: "@claude"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "tools": ["edit_file", "create_file", "read_file", "list_files"]
            }
